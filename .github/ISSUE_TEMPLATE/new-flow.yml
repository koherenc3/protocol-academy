name: New Flow Request
description: Request a new protocol flow — describe it in plain language; the agent builds it.
title: "[flow] <protocol>: <flow name>"
labels: ["new-flow"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the flow you want in plain language. You don't need to spell out
        actors, steps, payloads, or RFC links — the `@claude` agent researches the
        spec and authors all of that, then opens a PR with a Vercel preview for you
        to review. Add as much or as little detail as you like.
  - type: input
    id: request
    attributes:
      label: Protocol & flow
      description: Name the protocol and flow in whatever form is natural. The agent derives the ids.
      placeholder: "SCIM 2.0 — user provisioning   (or: OAuth 2.0 device authorization grant)"
    validations:
      required: true
  - type: textarea
    id: intent
    attributes:
      label: What should it teach?
      description: One or two sentences on what the flow accomplishes and what a learner should take away.
      placeholder: "How a client provisions/updates/deactivates users on a service provider over REST, and how it authenticates."
    validations:
      required: true
  - type: textarea
    id: flavor
    attributes:
      label: Constraints or flavor (optional)
      description: Anything specific you want shown — particular messages, toggles, edge cases, security points to emphasize.
      placeholder: "Show a PATCH update and a filtered GET. Mention Bearer-token auth. Add an mTLS toggle."
    validations:
      required: false
  - type: input
    id: anchor_ref
    attributes:
      label: Anchor spec/RFC (optional)
      description: A canonical source if you have one handy. Leave blank and the agent will find it.
      placeholder: "RFC 7644"
    validations:
      required: false
  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgement
      options:
        - label: I understand the agent authors the flow; I'll review the PR/preview before merge.
          required: true
