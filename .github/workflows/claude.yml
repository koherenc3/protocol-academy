name: Claude

# Two entry points:
#  1. An issue labeled `new-flow` → Claude builds the flow and opens a PR.
#  2. Anyone writing `@claude ...` in an issue/PR/review comment → Claude responds.
#
# Setup required (one-time):
#  - Install the Claude GitHub App on this repo: https://github.com/apps/claude
#    (the action exchanges an OIDC token for an app token to push/open PRs;
#    without it you get "Claude Code is not installed on this repository").
#  - Add repo secret ANTHROPIC_API_KEY.
#  - Allow GitHub Actions to create pull requests
#    (Settings → Actions → General → Workflow permissions).

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Run when an issue gets the `new-flow` label (applying a label requires
    # write/triage access, so this is inherently restricted), OR on a `@claude`
    # mention — but only from the repo owner/members/collaborators, so strangers
    # on this public repo can't spend API credits.
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'new-flow') ||
      (github.event_name != 'issues' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # For a labeled new-flow issue, give Claude an explicit task (the issue
          # body is injected after the ===REQUEST=== marker). For @claude
          # comments, prompt is empty and the action handles the comment itself.
          prompt: >
            ${{ (github.event_name == 'issues' && github.event.label.name == 'new-flow') &&
            format('A new protocol flow was requested in issue #{0} ("{1}"). Read AGENTS.md and follow it exactly to implement it: copy content/_template/flow into content/protocols/<protocol-id>/flows/<flow-id>/, fill in steps.ts and content.mdx, and add meta.ts only if it is a new protocol. Do NOT enable the topology view unless the request asks for it. Use realistic but fake payloads; for any JWT emit a genuinely base64url-decodable token. Run "npm install" then "npm run check" and fix issues until it passes. Open a pull request that closes #{0} and summarizes what you built. The full request follows. ===REQUEST=== {2}',
            github.event.issue.number, github.event.issue.title, github.event.issue.body) || '' }}
          # Enable file edits plus shell so Claude can run the project gate.
          claude_args: >
            --allowedTools Edit,Write,Read,Glob,Grep,Bash
            --max-turns 40
